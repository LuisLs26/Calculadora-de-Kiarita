<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Calculadora de Kiary</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&family=Outfit:wght@300;400;500;600;700&display=swap');

:root {
  --primary-pink: #ff1493;
  --sweet-pink: #ff69b4;
  --pastel-pink: #ffb3d1;
  --light-pink: #ffe6f2;
  --bg-gradient-1: #fff3f7;
  --bg-gradient-2: #ffe5ee;
  --text-dark: #8b008b;
  --glass-bg: rgba(255, 255, 255, 0.75);
  --glass-border: rgba(255, 105, 180, 0.35);
  --neon-shadow: 0 12px 40px 0 rgba(255, 20, 147, 0.15);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Outfit', sans-serif;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

body {
  background: radial-gradient(circle at center, var(--bg-gradient-1), var(--bg-gradient-2));
  height: 100vh;
  height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  position: relative;
}

/* Background animated particles */
.bg-particles {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  z-index: 0;
  pointer-events: none;
}

.bg-particle {
  position: absolute;
  display: block;
  pointer-events: none;
  animation: floatUp 15s linear infinite;
  opacity: 0.5;
}

@keyframes floatUp {
  0% {
    transform: translateY(105vh) translateX(0) rotate(0deg);
    opacity: 0;
  }
  10% {
    opacity: 0.6;
  }
  90% {
    opacity: 0.6;
  }
  100% {
    transform: translateY(-10vh) translateX(var(--drift)) rotate(var(--rot));
    opacity: 0;
  }
}

/* App container with Glassmorphism */
.app-container {
  background: var(--glass-bg);
  backdrop-filter: blur(25px);
  -webkit-backdrop-filter: blur(25px);
  border: 1px solid var(--glass-border);
  width: 100%;
  max-width: 410px;
  height: 90vh;
  max-height: 820px;
  border-radius: 32px;
  box-shadow: var(--neon-shadow), 0 20px 45px rgba(0, 0, 0, 0.05);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  z-index: 10;
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  animation: shadowPulse 5s ease-in-out infinite;
}

@keyframes shadowPulse {
  0%, 100% {
    box-shadow: var(--neon-shadow), 0 20px 45px rgba(0, 0, 0, 0.05);
    transform: translateY(0);
  }
  50% {
    box-shadow: 0 16px 55px 12px rgba(255, 20, 147, 0.28), 0 25px 50px rgba(0, 0, 0, 0.05);
    transform: translateY(-2px);
  }
}

@media (max-width: 480px) {
  .app-container {
    height: 100vh;
    height: 100dvh;
    max-height: 100vh;
    max-height: 100dvh;
    border-radius: 0;
    border: none;
  }

  .app-header {
    padding: 8px 16px 2px 16px;
  }

  .logo-text {
    font-size: 1.1rem;
  }

  .logo-emoji {
    font-size: 1.15rem;
  }

  .action-btn {
    width: 32px;
    height: 32px;
  }

  .pill-selector-container {
    padding: 2px 16px 4px 16px;
  }

  .pill-btn {
    padding: 7px 0;
    font-size: 0.82rem;
  }

  .lcd-display {
    padding: 8px 16px;
    min-height: 70px;
    gap: 1px;
  }

  .display-formula {
    font-size: 0.85rem;
    min-height: 1.0rem;
  }

  .buttons {
    gap: 6px;
    padding: 6px 10px;
  }

  button {
    font-size: 1.22rem;
    border-radius: 14px;
  }

  .ai-input-area {
    padding: 8px 14px 12px 14px; /* Reduced since dvh handles screen bounds */
    gap: 6px;
  }

  .ai-input {
    height: 38px;
    padding: 6px 12px;
    border-radius: 10px;
    font-size: 0.85rem;
  }

  .btn-ai {
    padding: 8px 0;
    border-radius: 10px;
    font-size: 0.88rem;
  }

  .chat-box {
    padding: 10px 12px;
    gap: 8px;
  }

  .msg-ai, .msg-user {
    font-size: 0.85rem;
    padding: 8px 12px;
  }

  .msg-avatar {
    width: 26px;
    height: 26px;
    font-size: 0.75rem;
  }
}

/* Header design */
.app-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 24px 24px 12px 24px;
  z-index: 11;
}

.app-logo {
  display: flex;
  align-items: center;
  gap: 8px;
}

.logo-emoji {
  font-size: 1.4rem;
  animation: rotatePulse 4s ease-in-out infinite;
  display: inline-block;
}

@keyframes rotatePulse {
  0%, 100% { transform: scale(1) rotate(0deg); }
  50% { transform: scale(1.18) rotate(15deg); }
}

.logo-text {
  font-family: 'Comfortaa', cursive;
  font-weight: 700;
  font-size: 1.35rem;
  color: var(--primary-pink);
  letter-spacing: -0.5px;
  text-shadow: 0 2px 5px rgba(255, 20, 147, 0.1);
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 12px;
}

.action-btn {
  background: rgba(255, 255, 255, 0.85);
  border: 1px solid rgba(255, 105, 180, 0.25);
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(255, 20, 147, 0.08);
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  outline: none;
}

.action-btn:hover {
  background: var(--light-pink);
  transform: scale(1.08);
  border-color: var(--pastel-pink);
}

.action-btn:active {
  transform: scale(0.95);
}

.action-btn .icon {
  font-size: 1.05rem;
  color: var(--primary-pink);
}

/* Sliding Pill Mode Switcher */
.pill-selector-container {
  padding: 4px 24px 16px 24px;
  z-index: 11;
}

.pill-selector {
  background: rgba(255, 255, 255, 0.5);
  border: 1px solid rgba(255, 105, 180, 0.15);
  border-radius: 50px;
  padding: 4px;
  display: flex;
  position: relative;
  box-shadow: inset 0 2px 5px rgba(255, 20, 147, 0.03);
}

.pill-glider {
  position: absolute;
  height: calc(100% - 8px);
  width: calc(50% - 4px);
  background: linear-gradient(135deg, var(--primary-pink), var(--sweet-pink));
  border-radius: 50px;
  top: 4px;
  left: 4px;
  transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: 0 4px 12px rgba(255, 20, 147, 0.25);
  z-index: 1;
}

.pill-btn {
  flex: 1;
  border: none;
  background: transparent;
  padding: 11px 0;
  font-weight: 600;
  font-size: 0.95rem;
  cursor: pointer;
  z-index: 2;
  color: var(--text-dark);
  transition: color 0.3s;
  font-family: 'Outfit', sans-serif;
  outline: none;
}

.pill-btn.active {
  color: #ffffff;
}

/* Calculator Screen (LCD-like Display) */
.lcd-display {
  background: linear-gradient(135deg, rgba(255, 255, 255, 0.6), rgba(255, 230, 242, 0.5), rgba(255, 255, 255, 0.6));
  background-size: 200% 200%;
  animation: gradientMove 8s ease infinite;
  border-top: 1px solid rgba(255, 255, 255, 0.4);
  border-bottom: 1px solid rgba(255, 105, 180, 0.12);
  padding: 24px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  align-items: flex-end;
  min-height: 160px;
  gap: 6px;
  word-break: break-all;
  position: relative;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.display-formula {
  font-size: 1.2rem;
  color: var(--sweet-pink);
  font-weight: 500;
  min-height: 1.6rem;
  opacity: 0.85;
  transition: all 0.2s;
  letter-spacing: 0.5px;
}

.display-value {
  font-size: 3.2rem;
  font-weight: 600;
  color: var(--text-dark);
  line-height: 1.15;
  transition: font-size 0.15s ease-out;
  transform-origin: right center;
}

.display-value.pop-animate {
  animation: displayPop 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.2);
}

@keyframes displayPop {
  0% { transform: scale(0.95); }
  50% { transform: scale(1.03); }
  100% { transform: scale(1); }
}

/* Calculator Buttons Layout */
.mode-content {
  display: none;
  flex-direction: column;
  flex: 1;
  overflow: hidden;
}

.mode-content.active-mode {
  display: flex;
  animation: fadeScaleIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

@keyframes fadeScaleIn {
  from {
    opacity: 0;
    transform: scale(0.97);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}

@keyframes buttonEntrance {
  from {
    opacity: 0;
    transform: translateY(12px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.buttons {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  padding: 24px;
  background: rgba(255, 255, 255, 0.2);
}

button {
  font-size: 1.7rem;
  font-weight: 500;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
  outline: none;
  display: flex;
  justify-content: center;
  align-items: center;
}

.number {
  background: rgba(255, 255, 255, 0.85);
  color: var(--text-dark);
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02), inset 0 2px 4px rgba(255, 255, 255, 0.9);
  border: 1px solid rgba(255, 182, 193, 0.2);
}

.number:hover {
  background: #ffffff;
  transform: translateY(-2px);
  box-shadow: 0 6px 14px rgba(255, 105, 180, 0.1), inset 0 2px 4px rgba(255, 255, 255, 1);
}

.decimal {
  background: rgba(255, 255, 255, 0.85);
  color: var(--text-dark);
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02), inset 0 2px 4px rgba(255, 255, 255, 0.9);
  border: 1px solid rgba(255, 182, 193, 0.2);
}

.decimal:hover {
  background: #ffffff;
  transform: translateY(-2px);
  box-shadow: 0 6px 14px rgba(255, 105, 180, 0.1), inset 0 2px 4px rgba(255, 255, 255, 1);
}

.operator {
  background: rgba(255, 77, 166, 0.14);
  color: var(--primary-pink);
  border: 1px solid rgba(255, 20, 147, 0.15);
  box-shadow: 0 4px 10px rgba(255, 20, 147, 0.04);
  font-weight: 600;
}

.operator:hover {
  background: rgba(255, 20, 147, 0.22);
  transform: translateY(-2px);
  box-shadow: 0 6px 14px rgba(255, 20, 147, 0.14);
}

.special {
  background: rgba(255, 230, 242, 0.55);
  color: var(--primary-pink);
  border: 1px solid rgba(255, 182, 193, 0.28);
  box-shadow: 0 4px 10px rgba(255, 20, 147, 0.02);
  font-weight: 500;
}

.special:hover {
  background: rgba(255, 230, 242, 0.85);
  transform: translateY(-2px);
  box-shadow: 0 6px 14px rgba(255, 20, 147, 0.06);
}

.equal {
  background: linear-gradient(135deg, var(--primary-pink), var(--sweet-pink));
  color: white;
  box-shadow: 0 6px 18px rgba(255, 20, 147, 0.3);
  font-weight: 600;
  border: none;
}

.equal:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 22px rgba(255, 20, 147, 0.4);
  filter: brightness(1.05);
}

button:active {
  transform: translateY(1px) scale(0.95) !important;
  box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05) !important;
}

.zero {
  grid-column: span 2;
}

/* AI Chat Window Design */
.ai-chat-container {
  display: flex;
  flex-direction: column;
  height: 100%;
  background: rgba(255, 255, 255, 0.22);
  overflow: hidden;
}

.chat-box {
  flex: 1;
  padding: 20px 24px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scroll-behavior: smooth;
}

.chat-box::-webkit-scrollbar {
  width: 6px;
}

.chat-box::-webkit-scrollbar-track {
  background: transparent;
}

.chat-box::-webkit-scrollbar-thumb {
  background: rgba(255, 105, 180, 0.2);
  border-radius: 10px;
}

.chat-box::-webkit-scrollbar-thumb:hover {
  background: rgba(255, 105, 180, 0.4);
}

.msg-container {
  display: flex;
  gap: 10px;
  max-width: 85%;
  align-items: flex-end;
  animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}

@keyframes popIn {
  from { transform: scale(0.9) translateY(10px); opacity: 0; }
  to { transform: scale(1) translateY(0); opacity: 1; }
}

.msg-ai-container {
  align-self: flex-start;
}

.msg-user-container {
  align-self: flex-end;
  flex-direction: row-reverse;
}

.msg-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary-pink), var(--sweet-pink));
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 0.95rem;
  box-shadow: 0 4px 8px rgba(255, 20, 147, 0.18);
  flex-shrink: 0;
}

.msg-ai {
  background: #ffffff;
  color: #5d0f43;
  padding: 12px 16px;
  border-radius: 20px 20px 20px 4px;
  font-size: 0.95rem;
  line-height: 1.45;
  box-shadow: 0 4px 12px rgba(255, 105, 180, 0.06);
  border: 1px solid rgba(255, 182, 193, 0.25);
}

.msg-user {
  background: linear-gradient(135deg, var(--primary-pink), var(--sweet-pink));
  color: white;
  padding: 12px 16px;
  border-radius: 20px 20px 4px 20px;
  font-size: 0.95rem;
  line-height: 1.45;
  box-shadow: 0 4px 12px rgba(255, 20, 147, 0.12);
}

/* Typing Indicator Animation */
.typing-indicator {
  display: flex;
  gap: 10px;
  align-self: flex-start;
  margin-bottom: 12px;
  animation: popIn 0.3s ease forwards;
}

.dots-container {
  background: #ffffff;
  border: 1px solid rgba(255, 182, 193, 0.25);
  padding: 12px 20px;
  border-radius: 20px 20px 20px 4px;
  display: flex;
  gap: 6px;
  align-items: center;
  box-shadow: 0 4px 12px rgba(255, 105, 180, 0.06);
}

.dot {
  width: 7px;
  height: 7px;
  background: var(--sweet-pink);
  border-radius: 50%;
  animation: bounceDot 1.4s infinite ease-in-out both;
}

.dot:nth-child(1) { animation-delay: -0.32s; }
.dot:nth-child(2) { animation-delay: -0.16s; }

@keyframes bounceDot {
  0%, 80%, 100% { transform: scale(0); }
  40% { transform: scale(1.0); }
}

/* AI Input Section */
.ai-input-area {
  padding: 16px 24px;
  border-top: 1px solid rgba(255, 105, 180, 0.1);
  background: rgba(255, 255, 255, 0.35);
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.ai-input {
  width: 100%;
  height: 52px;
  padding: 12px 16px;
  border: 1px solid rgba(255, 105, 180, 0.22);
  background: rgba(255, 255, 255, 0.85);
  border-radius: 16px;
  font-size: 0.95rem;
  resize: none;
  outline: none;
  color: var(--text-dark);
  transition: all 0.3s;
  font-family: inherit;
}

.ai-input:focus {
  border-color: var(--primary-pink);
  box-shadow: 0 0 10px rgba(255, 20, 147, 0.1), inset 0 1px 3px rgba(0, 0, 0, 0.02);
  background: #ffffff;
}

.btn-ai {
  background: linear-gradient(135deg, var(--primary-pink), var(--sweet-pink));
  color: white;
  font-weight: 600;
  font-size: 1rem;
  border-radius: 16px;
  padding: 12px 0;
  border: none;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(255, 20, 147, 0.2);
  transition: all 0.3s;
  width: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: inherit;
}

.btn-ai:hover {
  box-shadow: 0 6px 20px rgba(255, 20, 147, 0.3);
  filter: brightness(1.05);
  transform: translateY(-1px);
}

.btn-ai:active {
  transform: translateY(1px) scale(0.98);
}

/* Glitter and Stars system */
#heartContainer {
  position: fixed;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 9999;
  top: 0;
  left: 0;
}

.glitter {
  position: absolute;
  animation: glitterAnim 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
  pointer-events: none;
}

@keyframes glitterAnim {
  0% {
    transform: translate(-50%, -50%) scale(0.2) rotate(0deg);
    opacity: 1;
  }
  100% {
    transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(var(--scale, 1.2)) rotate(var(--rot, 360deg));
    opacity: 0;
  }
}

/* History Modal Overlay */
.history-modal-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(255, 230, 242, 0.45);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  z-index: 100;
  display: flex;
  justify-content: center;
  align-items: flex-end;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}

.history-modal-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

.history-modal {
  width: 100%;
  max-height: 70%;
  background: rgba(255, 255, 255, 0.95);
  border-top-left-radius: 28px;
  border-top-right-radius: 28px;
  border-top: 1px solid var(--glass-border);
  box-shadow: 0 -10px 30px rgba(255, 20, 147, 0.12);
  padding: 20px 20px 24px 20px;
  display: flex;
  flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
}

.history-modal-overlay.active .history-modal {
  transform: translateY(0);
}

.history-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
  border-bottom: 1px dashed rgba(255, 20, 147, 0.15);
  padding-bottom: 10px;
}

.history-title {
  font-family: 'Comfortaa', cursive;
  color: var(--text-dark);
  font-weight: 700;
  font-size: 1.15rem;
}

.history-close-btn {
  background: transparent;
  border: none;
  font-size: 1.3rem;
  cursor: pointer;
  color: var(--sweet-pink);
  padding: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.2s;
}

.history-close-btn:hover {
  transform: scale(1.1) rotate(90deg);
}

.history-tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.history-tab-btn {
  flex: 1;
  background: rgba(255, 230, 242, 0.5);
  border: 1px solid rgba(255, 105, 180, 0.15);
  border-radius: 12px;
  padding: 8px;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-dark);
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}

.history-tab-btn.active {
  background: linear-gradient(135deg, var(--primary-pink), var(--sweet-pink));
  color: white;
  border: none;
  box-shadow: 0 4px 10px rgba(255, 20, 147, 0.2);
}

.history-content {
  flex: 1;
  overflow-y: auto;
  margin-bottom: 15px;
  min-height: 180px;
}

.history-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  list-style: none;
}

.history-item {
  background: white;
  border: 1px solid rgba(255, 182, 193, 0.25);
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 0.9rem;
  color: var(--text-dark);
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  justify-content: space-between;
  align-items: center;
  animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

@keyframes slideIn {
  from { transform: translateX(-10px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

.history-item:hover {
  background: var(--light-pink);
  transform: translateX(4px);
  border-color: var(--pastel-pink);
}

.history-empty {
  text-align: center;
  color: var(--sweet-pink);
  font-size: 0.9rem;
  padding: 30px 20px;
  opacity: 0.8;
  font-style: italic;
}

.history-actions-row {
  display: flex;
  gap: 10px;
}

.btn-history-action {
  flex: 1;
  font-size: 0.88rem;
  padding: 10px 0;
  border-radius: 12px;
  font-weight: 600;
  cursor: pointer;
  background: rgba(255, 230, 242, 0.8);
  color: var(--text-dark);
  border: 1px solid rgba(255, 105, 180, 0.2);
  transition: all 0.2s;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: inherit;
}

.btn-history-action:hover {
  background: var(--light-pink);
  transform: translateY(-1px);
}

.btn-history-action.danger {
  color: #ff1493;
  border-color: rgba(255, 20, 147, 0.35);
  background: rgba(255, 230, 242, 0.4);
}

.btn-history-action.danger:hover {
  background: rgba(255, 20, 147, 0.1);
}

/* More premium animations/details */
button:active {
  transform: scale(0.95);
}

.operator, .equal, .btn-ai {
  position: relative;
  overflow: hidden;
}

.operator::after, .equal::after, .btn-ai::after {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: linear-gradient(to bottom right, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0) 40%, rgba(255, 255, 255, 0.3) 50%, rgba(255, 255, 255, 0) 60%, rgba(255, 255, 255, 0) 100%);
  transform: rotate(30deg);
  transition: transform 0.5s ease;
  pointer-events: none;
}

.operator:hover::after, .equal:hover::after, .btn-ai:hover::after {
  transform: rotate(30deg) translate(20%, 20%);
  animation: shineSweep 1.2s infinite;
}

@keyframes shineSweep {
  0% { transform: rotate(30deg) translate(-80%, -80%); }
  100% { transform: rotate(30deg) translate(80%, 80%); }
}

.logo-emoji:hover {

}
</style>
</head>

<body>

<!-- Interactive Particle Background -->
<div class="bg-particles" id="bgParticles"></div>

<div class="app-container">
  
  <!-- Premium Header -->
  <div class="app-header">
    <div class="app-logo">
      <span class="logo-emoji">🌸</span>
      <span class="logo-text">Kiary</span>
    </div>
    <div class="header-actions">
      <button class="action-btn" id="historyToggleBtn" onclick="toggleHistory()" title="Ver Historial">
        <span class="icon">📜</span>
      </button>
      <button class="action-btn" id="voiceToggleBtn" onclick="toggleVoice()" title="Silenciar/Activar Voz">
        <span class="icon">🔊</span>
      </button>
    </div>
  </div>

  <!-- Custom Pill Selector Switcher -->
  <div class="pill-selector-container">

      <div class="pill-glider" id="pillGlider"></div>
      <button class="pill-btn active" id="btnModeNormal" onclick="changeMode('normal')">Estándar</button>

          <div class="dot"></div>
          <div class="dot"></div>

      <div class="ai-input-area">
        <textarea id="aiInput" class="ai-input" placeholder="Escribe tu problema aquí, Kiaris..." onkeydown="handleAIInputKey(event)"></textarea>

  </div>

  <!-- History Modal Overlay -->
  <div id="historyModalOverlay" class="history-modal-overlay" onclick="closeHistoryOverlay(event)">
    <div class="history-modal" onclick="event.stopPropagation()">
      <div class="history-header">
        <span class="history-title">Historial 🌸</span>
        <button class="history-close-btn" onclick="toggleHistory()">✕</button>
      </div>
      <div class="history-tabs">
        <button id="tabCalcBtn" class="history-tab-btn active" onclick="switchHistoryTab('calc')">Cálculos 🔢</button>
        <button id="tabChatBtn" class="history-tab-btn" onclick="switchHistoryTab('chat')">Conversación 💬</button>
      </div>
      <div class="history-content">
        <div id="calcHistoryContent">
          <ul id="calcHistoryList" class="history-list">
            <!-- Dynamically populated -->
          </ul>
          <div id="calcHistoryEmpty" class="history-empty" style="display: none;">
            No hay operaciones recientes, ¡haz cuentas! 🌸
          </div>
        </div>
        <div id="chatHistoryContent" style="display: none;">
          <div id="chatHistorySummary" style="font-size: 0.88rem; color: var(--text-dark); margin-bottom: 15px; text-align: center; opacity: 0.8;">
            La conversación actual se guarda de forma local en tu navegador.
          </div>
          <div class="history-actions-row">
            <button class="btn-history-action danger" onclick="clearChatHistory()">Limpiar Mensajes 💬</button>
          </div>
        </div>
      </div>
      <div class="history-actions-row" id="calcHistoryActions">
        <button class="btn-history-action" onclick="clearCalcHistory()">Limpiar Cálculos 🔢</button>

<div id="heartContainer"></div>

<script>
const displayFormula = document.getElementById('displayFormula');
const displayValue = document.getElementById('displayValue');
const buttonsContainer = document.getElementById('buttonsContainer');
const heartContainer = document.getElementById('heartContainer');

let currentInput = '0';
let previousInput = '';
let operator = '';
let isMuted = localStorage.getItem('kiary_muted') === 'true';
let awaitingOperand = false;
let lastExpression = '';
let justCalculated = false;

// History state variables
let aiHistory = [];
let calcHistory = [];
let currentHistoryTab = 'calc';

const speechMap = {
 '0':'cero','1':'uno','2':'dos','3':'tres','4':'cuatro',
 '5':'cinco','6':'seis','7':'siete','8':'ocho','9':'nueve',
 '+':'más','−':'menos','×':'por','÷':'dividido'
};

// Initialize Background Particles & Voice Toggle status & Load Histories
window.addEventListener('DOMContentLoaded', () => {
  initBackgroundParticles();
  updateVoiceButton();
  loadHistories();
});

function initBackgroundParticles() {
  const container = document.getElementById('bgParticles');
  const emojis = ['🌸', '✨', '🩷', '🎀', '🌸', '✨'];
  
  for (let i = 0; i < 20; i++) {
    createSingleParticle(container, emojis, true);
  }
  
  setInterval(() => {
    if (container.children.length < 25) {
      createSingleParticle(container, emojis, false);
    }
  }, 3500);
}

function createSingleParticle(container, emojis, isInitial) {
  const p = document.createElement('div');
  p.className = 'bg-particle';
  p.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
  
  const size = 12 + Math.random() * 20;
  p.style.fontSize = size + 'px';
  p.style.left = (Math.random() * 100) + 'vw';
  
  if (isInitial) {
    p.style.top = (Math.random() * 100) + 'vh';
  } else {
    p.style.top = '105vh';
  }
  
  const drift = (Math.random() * 220 - 110) + 'px';
  const rot = (Math.random() * 360 + 180) + 'deg';
  p.style.setProperty('--drift', drift);
  p.style.setProperty('--rot', rot);
  
  const duration = 12 + Math.random() * 16;
  p.style.animationDuration = duration + 's';
  p.style.animationDelay = (Math.random() * -12) + 's';
  
  container.appendChild(p);
  
  setTimeout(() => {
    p.remove();
  }, duration * 1000);
}

function speak(text){
  if(isMuted) return;
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  let u = new SpeechSynthesisUtterance(text);
  u.lang = 'es-ES';
  u.pitch = 1.3; // Cute magical girl pitch
  u.rate = 1.05;
  speechSynthesis.speak(u);
}

function toggleVoice() {
  isMuted = !isMuted;
  localStorage.setItem('kiary_muted', isMuted);
  updateVoiceButton();
  speak(isMuted ? "silencio" : "activado");
}

function updateVoiceButton() {
  const btn = document.getElementById('voiceToggleBtn');
  if (isMuted) {
    btn.innerHTML = '<span class="icon">🔇</span>';
    btn.style.opacity = '0.55';
  } else {
    btn.innerHTML = '<span class="icon">🔊</span>';
    btn.style.opacity = '1';
  }
}

function adjustDisplayFontSize() {
  const len = displayValue.textContent.length;
  const mobile = window.innerWidth <= 480;

  if(mobile) {
    if (len > 16) displayValue.style.fontSize = '1.1rem';
    else if (len > 12) displayValue.style.fontSize = '1.4rem';
    else if (len > 8) displayValue.style.fontSize = '1.9rem';
    else displayValue.style.fontSize = '2.5rem';
  } else {
    if (len > 16) displayValue.style.fontSize = '1.5rem';
    else if (len > 12) displayValue.style.fontSize = '1.8rem';
    else if (len > 8) displayValue.style.fontSize = '2.4rem';
    else displayValue.style.fontSize = '3.2rem';
  }
}

function updateDisplay(){
  if(operator){
    // Mostrar expresión completa junta: "7 × 8"
    let expression = previousInput + ' ' + operator;
    if(!awaitingOperand) {
      expression += ' ' + currentInput;
    }
    displayFormula.textContent = '';
    displayValue.textContent = expression;
  } else {
    // Después de = mostrar la expresión anterior arriba y el resultado abajo
    displayFormula.textContent = lastExpression;
    displayValue.textContent = currentInput;
  }
  adjustDisplayFontSize();

  // Play display value pop animation
  displayValue.classList.remove('pop-animate');
  void displayValue.offsetWidth; // Trigger reflow
  displayValue.classList.add('pop-animate');
}

function calculate(){
  let a = parseFloat(previousInput);
  let b = parseFloat(currentInput);
  let result;

  // Guardar la expresión para mostrarla después del resultado
  lastExpression = previousInput + ' ' + operator + ' ' + currentInput + ' =';

  switch(operator){
    case '+': result = a + b; break;
    case '−': result = a - b; break;
    case '×': result = a * b; break;
    case '÷': result = b === 0 ? 'Error' : a / b; break;
  }

  if(typeof result === "number"){
    currentInput = Number.isInteger(result) ? result.toString() : parseFloat(result.toFixed(6)).toString();
  } else {
    currentInput = 'Error';
  }

  // Save to calculation history
  const operationStr = lastExpression + ' ' + currentInput;
  addCalcHistory(operationStr);

  operator = '';
  previousInput = '';
  awaitingOperand = false;
  justCalculated = true;
}

function showGlitter(event, count = 35) {
  const emojis = ['🩷', '💖', '✨', '🌸', '🎀', '🥰'];
  
  let startX = window.innerWidth / 2;
  let startY = window.innerHeight * 0.6;
  
  // Use precise click coordinates if the event is available
  if (event && event.clientX && event.clientY) {
    startX = event.clientX;
    startY = event.clientY;
  }
  
  for (let i = 0; i < count; i++) {
    let g = document.createElement('div');
    g.className = 'glitter';
    g.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
    
    g.style.left = startX + 'px';
    g.style.top = startY + 'px';
    
    let tx = (Math.random() * 320 - 160) + 'px'; 
    let ty = (Math.random() * -380 - 40) + 'px'; 
    
    g.style.setProperty('--tx', tx);
    g.style.setProperty('--ty', ty);
    g.style.setProperty('--scale', (0.55 + Math.random() * 0.85));
    g.style.setProperty('--rot', (Math.random() * 720 - 360) + 'deg');
    g.style.fontSize = (11 + Math.random() * 16) + 'px';
    
    heartContainer.appendChild(g);
    
    setTimeout(() => g.remove(), 1200);
  }
}

function handleButton(val, event){
  if(speechMap[val]) speak(speechMap[val]);

  if(!isNaN(val)){
    if(justCalculated) {
      currentInput = val;
      lastExpression = '';
      justCalculated = false;
    } else if(awaitingOperand) {
      currentInput = val;
      awaitingOperand = false;
    } else {
      currentInput = currentInput === '0' ? val : currentInput + val;
    }
    showGlitter(event, 8);
  }
  else if(val === '.'){
    if(justCalculated) {
      currentInput = '0.';
      lastExpression = '';
      justCalculated = false;
    } else if(awaitingOperand) {
      currentInput = '0.';
      awaitingOperand = false;
    } else if(!currentInput.includes('.')) {
      currentInput += '.';
    }
    showGlitter(event, 8);
  }
  else if(val === '%'){
    currentInput = (parseFloat(currentInput) / 100).toString();
    justCalculated = false;
    showGlitter(event, 35);
  }
  else if(['+','−','×','÷'].includes(val)){
    if(operator && !awaitingOperand) {
      // Encadenar operaciones: calcular primero
      calculate();
      lastExpression = '';
    }
    previousInput = currentInput;
    operator = val;
    awaitingOperand = true;
    justCalculated = false;
    showGlitter(event, 35);
  }
  else if(val === '='){
    if(operator && !awaitingOperand){
      calculate();
      showGlitter(event, 35);
      speak("resultado " + currentInput);
    }
  }
  else if(val === 'AC'){
    currentInput='0';
    previousInput='';
    operator='';
    lastExpression = '';
    awaitingOperand = false;
    justCalculated = false;
    showGlitter(event, 10);
  }
  else if(val === '+/-'){
    currentInput = (parseFloat(currentInput)*-1).toString();
    justCalculated = false;
    showGlitter(event, 8);
  }

  updateDisplay();
}

const values = [
 'AC','+/-','%','÷',
 '7','8','9','×',
 '4','5','6','−',
 '1','2','3','+',
 '0','.','='
];

values.forEach((v, index)=>{
  let b=document.createElement('button');
  b.textContent=v;
  b.onclick=(e)=>handleButton(v, e);

  if(v==='0') b.classList.add('zero');
  if(!isNaN(v)) b.classList.add('number');
  else if(v==='.') b.classList.add('decimal');
  else if(['+','−','×','÷'].includes(v)) b.classList.add('operator');
  else if(v==='=') b.classList.add('equal');
  else b.classList.add('special');

  // Fade-in cascade transition on load
  b.style.opacity = '0';
  b.style.animation = 'buttonEntrance 0.45s cubic-bezier(0.16, 1, 0.3, 1) forwards';
  b.style.animationDelay = (index * 15) + 'ms';

  buttonsContainer.appendChild(b);
});

updateDisplay();

function changeMode(mode) {
  const btnNormal = document.getElementById('btnModeNormal');
  const btnAI = document.getElementById('btnModeAI');
  const glider = document.getElementById('pillGlider');
  const normalMode = document.getElementById('normalMode');
  const aiMode = document.getElementById('aiMode');

  if(mode === 'normal') {
    btnNormal.classList.add('active');
    btnAI.classList.remove('active');
    glider.style.transform = 'translateX(0%)';
    normalMode.classList.add('active-mode');
    aiMode.classList.remove('active-mode');
    speak("modo normal");
  } else {
    btnNormal.classList.remove('active');
    btnAI.classList.add('active');
    glider.style.transform = 'translateX(100%)';
    normalMode.classList.remove('active-mode');
    aiMode.classList.add('active-mode');
    speak("modo inteligente");
    
    setTimeout(() => {
      const chatBox = document.getElementById("chatBox");
      chatBox.scrollTop = chatBox.scrollHeight;
    }, 100);
  }
  showGlitter();
}

function handleAIInputKey(event) {
  if (event.key === 'Enter' && !event.shiftKey) {
    event.preventDefault();
    sendToAI();
  }
}

// History Helpers: Load, Save, Render and Toggles
function loadHistories() {
  try {
    const chatData = localStorage.getItem('kiary_chat_history');
    if (chatData) {
      aiHistory = JSON.parse(chatData);
      renderChatHistory();
    }
  } catch (e) {
    console.error("Error loading chat history:", e);
    aiHistory = [];
  }

  try {
    const calcData = localStorage.getItem('kiary_calc_history');
    if (calcData) {
      calcHistory = JSON.parse(calcData);
    }
  } catch (e) {
    console.error("Error loading calc history:", e);
    calcHistory = [];
  }
}

function renderChatHistory() {
  const chatBox = document.getElementById("chatBox");
  chatBox.innerHTML = `
    <div class="msg-container msg-ai-container">
      <div class="msg-avatar">✨</div>
      <div class="msg-ai">¡Hola Kiaris! ✨ Escribe cualquier problema de matemáticas que tengas y te ayudaré a resolverlo.</div>
    </div>
  `;

  aiHistory.forEach(msg => {
    const container = document.createElement('div');
    if (msg.role === 'user') {
      container.className = 'msg-container msg-user-container';
      const bubble = document.createElement('div');
      bubble.className = 'msg-user';
      bubble.textContent = msg.content;
      container.appendChild(bubble);
    } else if (msg.role === 'assistant') {
      container.className = 'msg-container msg-ai-container';
      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = '✨';
      const bubble = document.createElement('div');
      bubble.className = 'msg-ai';
      bubble.innerHTML = msg.content.replace(/\n/g, '<br>');
      container.appendChild(avatar);
      container.appendChild(bubble);
    }
    chatBox.appendChild(container);
  });
  chatBox.scrollTop = chatBox.scrollHeight;
}

function addChatMessage(role, content) {
  aiHistory.push({ role, content });
  if (aiHistory.length > 40) {
    aiHistory.shift();
  }
  localStorage.setItem('kiary_chat_history', JSON.stringify(aiHistory));
}

function addCalcHistory(op) {
  calcHistory.push(op);
  if (calcHistory.length > 10) {
    calcHistory.shift();
  }
  localStorage.setItem('kiary_calc_history', JSON.stringify(calcHistory));
}

function toggleHistory() {
  const overlay = document.getElementById('historyModalOverlay');
  overlay.classList.toggle('active');
  if (overlay.classList.contains('active')) {
    renderHistoryModal();
    speak("abriendo historial");
  } else {
    speak("cerrando historial");
  }
  showGlitter();
}

function closeHistoryOverlay(e) {
  toggleHistory();
}

function switchHistoryTab(tab) {
  currentHistoryTab = tab;
  const tabCalcBtn = document.getElementById('tabCalcBtn');
  const tabChatBtn = document.getElementById('tabChatBtn');
  const calcContent = document.getElementById('calcHistoryContent');
  const chatContent = document.getElementById('chatHistoryContent');
  const calcActions = document.getElementById('calcHistoryActions');

  if (tab === 'calc') {
    tabCalcBtn.classList.add('active');
    tabChatBtn.classList.remove('active');
    calcContent.style.display = 'block';
    chatContent.style.display = 'none';
    calcActions.style.display = 'flex';
  } else {
    tabCalcBtn.classList.remove('active');
    tabChatBtn.classList.add('active');
    calcContent.style.display = 'none';
    chatContent.style.display = 'block';
    calcActions.style.display = 'none';
  }
  showGlitter();
}

function renderHistoryModal() {
  const listEl = document.getElementById('calcHistoryList');
  const emptyEl = document.getElementById('calcHistoryEmpty');
  listEl.innerHTML = '';

  if (calcHistory.length === 0) {
    emptyEl.style.display = 'block';
  } else {
    emptyEl.style.display = 'none';
    [...calcHistory].reverse().forEach(op => {
      const li = document.createElement('li');
      li.className = 'history-item';
      li.innerHTML = `<span>${op}</span> <span style="font-size: 0.8rem; opacity: 0.6;">📋</span>`;
      li.onclick = (e) => {
        const parts = op.split('=');
        if (parts.length > 1) {
          const resultStr = parts[1].trim();
          if (resultStr !== 'Error') {
            currentInput = resultStr;
            lastExpression = parts[0].trim() + ' =';
            justCalculated = true;
            operator = '';
            previousInput = '';
            awaitingOperand = false;
            updateDisplay();
            toggleHistory();
            speak("cargado " + resultStr);
            showGlitter(e);
          }
        }
      };
      listEl.appendChild(li);
    });
  }
}

function clearCalcHistory() {
  calcHistory = [];
  localStorage.removeItem('kiary_calc_history');
  renderHistoryModal();
  speak("historial de cálculos borrado");
  showGlitter();
}

function clearChatHistory() {
  aiHistory = [];
  localStorage.removeItem('kiary_chat_history');
  renderChatHistory();
  toggleHistory();
  speak("historial de chat borrado");
  showGlitter();
}

async function sendToAI() {
  const inputEl = document.getElementById("aiInput");
  const text = inputEl.value.trim();
  if(!text) return;

  const chatBox = document.getElementById("chatBox");
  const typingIndicator = document.getElementById("typingIndicator");

  // Save and append user bubble
  addChatMessage('user', text);

  const userMsgContainer = document.createElement('div');
  userMsgContainer.className = 'msg-container msg-user-container';
  
  const userMsg = document.createElement('div');
  userMsg.className = 'msg-user';
  userMsg.textContent = text;
  
  userMsgContainer.appendChild(userMsg);
  chatBox.appendChild(userMsgContainer);
  
  inputEl.value = "";
  chatBox.scrollTop = chatBox.scrollHeight;
  showGlitter();

  // Show typing indicator
  typingIndicator.style.display = 'flex';
  chatBox.appendChild(typingIndicator);
  chatBox.scrollTop = chatBox.scrollHeight;

  const apiKey = atob("bnZhcGktR2VCYzlhUGM4R1Ixa1pzeFhBc2VSQ0hHR0VrWEYtaW1CSDJZMXVtRTVyWUlLaE8tbjMtN3dMR3d5SWhZaExQdg==");
  const nvidiaUrl = "https://integrate.api.nvidia.com/v1/chat/completions";
  const url = "https://corsproxy.io/?" + encodeURIComponent(nvidiaUrl);

  const systemPrompt = "Eres una asistente en una calculadora rosa llamada Kiary. Estás ayudando a una chica llamada Kiara. Llámala cariñosamente Kiaris, Kiary o Kiarita. Sé amigable pero no demasiado melosa o empalagosa. Resuelve problemas matemáticos de forma MUY BREVE y directa (máximo 2 o 3 líneas). REGLAS: NO te presentes. SOLO si te pregunta específicamente '¿quién te creó?' o '¿quién es tu creador?' responde con orgullo que tu creador es Luis Nureña; de lo contrario no lo menciones. Usa emojis moderadamente (✨, 🌸). Responde siempre en español.";

  const messagesToSend = [];
  messagesToSend.push({ role: "system", content: systemPrompt });

  // Add calculator context (only last 3 operations, very cheap token usage)
  if (calcHistory.length > 0) {
    const recentCalcs = calcHistory.slice(-3).join(", ");
    messagesToSend.push({
      role: "system",
      content: `[Contexto del dispositivo] Operaciones recientes del usuario en la calculadora: ${recentCalcs}. Utiliza esta información si el usuario te pregunta sobre sus cálculos.`
    });
  }

  // Add recent chat history (last 4 turns to keep tokens/cost extremely low)
  const recentChat = aiHistory.slice(-5, -1); // Exclude the current message we just pushed
  recentChat.forEach(msg => {
    messagesToSend.push({ role: msg.role, content: msg.content });
  });

  // Current user message
  messagesToSend.push({ role: "user", content: text });

  try {
    const response = await fetch(url, {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + apiKey
      },
      body: JSON.stringify({
        model: "meta/llama-3.1-8b-instruct",
        messages: messagesToSend,
        max_tokens: 250,
        temperature: 0.7
      })
    });

    const data = await response.json();
    
    // Hide typing indicator
    typingIndicator.style.display = 'none';
    
    const aiMsgContainer = document.createElement('div');
    aiMsgContainer.className = 'msg-container msg-ai-container';
    
    const aiAvatar = document.createElement('div');
    aiAvatar.className = 'msg-avatar';
    aiAvatar.textContent = '✨';
    
    const aiMsg = document.createElement('div');
    aiMsg.className = 'msg-ai';
    
    aiMsgContainer.appendChild(aiAvatar);
    aiMsgContainer.appendChild(aiMsg);
    chatBox.appendChild(aiMsgContainer);

    let iaResponseText = "";

    if (response.status === 429) {
      iaResponseText = "¡Uf! 🌸 Me emocioné calculando muy rápido. Esperemos un momentito y vuelve a preguntarme, linda. 🎀";
      aiMsg.innerHTML = iaResponseText;
    }
    else if (!response.ok || data.error) {
      const errMsg = data.error ? (data.error.message || JSON.stringify(data.error)) : ("Error " + response.status);
      iaResponseText = "¡Uy, linda! Hubo un problemita: " + errMsg;
      aiMsg.innerHTML = iaResponseText;
    } 
    else if(data.choices && data.choices.length > 0 && data.choices[0].message) {
      iaResponseText = data.choices[0].message.content;
      aiMsg.innerHTML = iaResponseText.replace(/\n/g, '<br>');
    } 
    else {
      iaResponseText = "¡Uy! Recibí algo extraño: " + JSON.stringify(data);
      aiMsg.innerHTML = iaResponseText;
    }

    // Save assistant response
    addChatMessage('assistant', iaResponseText);
    
    chatBox.scrollTop = chatBox.scrollHeight;
    showGlitter();

  } catch (error) {
    typingIndicator.style.display = 'none';
    
    const aiMsgContainer = document.createElement('div');
    aiMsgContainer.className = 'msg-container msg-ai-container';
    
    const aiAvatar = document.createElement('div');
    aiAvatar.className = 'msg-avatar';
    aiAvatar.textContent = '✨';
    
    const aiMsg = document.createElement('div');
    aiMsg.className = 'msg-ai';
    const fallbackText = "¡Ups, preciosa! 🌸 Hubo un problema de conexión. Verifica tu internet y vuelve a intentarlo, por favor. 🎀";
    aiMsg.innerHTML = fallbackText;
    
    aiMsgContainer.appendChild(aiAvatar);
    aiMsgContainer.appendChild(aiMsg);
    chatBox.appendChild(aiMsgContainer);
    chatBox.scrollTop = chatBox.scrollHeight;
  }
}
</script>

</body>
</html>
