<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Kiary 💖</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#ffe6f2;
}

.header{
  background:#ff1493;
  color:white;
  text-align:center;
  padding:15px;
  font-size:20px;
}

.mode-selector{
  text-align:center;
  padding:10px;
  background:#ff1493;
}

select{
  padding:5px;
  border-radius:10px;
}

.display{
  background:white;
  padding:20px;
  font-size:28px;
  text-align:right;
}

.buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:10px;
}

button{
  padding:20px;
  font-size:18px;
  border:none;
  border-radius:10px;
}

#aiMode{
  display:none;
  padding:15px;
}

.msg-user{
  background:#ff4da6;
  color:white;
  padding:10px;
  margin:5px;
  border-radius:10px;
  text-align:right;
}

.msg-ai{
  background:white;
  padding:10px;
  margin:5px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="header">Calculadora de Kiary 💖</div>

<div class="mode-selector">
<select onchange="switchMode()" id="mode">
<option value="normal">Modo Normal</option>
<option value="ia">Modo IA</option>
</select>
</div>

<div id="normal">
<div id="display" class="display">0</div>
<div class="buttons" id="buttons"></div>
</div>

<div id="aiMode">
<div id="chat"></div>
<textarea id="input" style="width:100%;height:60px;"></textarea>
<button onclick="send()">Resolver 💖</button>
</div>

<script>
// ---------------- CALCULADORA ----------------
let current="0";
let prev="";
let op="";

function update(){
 document.getElementById("display").textContent=current;
}

function calc(){
 let a=parseFloat(prev);
 let b=parseFloat(current);
 let r;

 switch(op){
  case '+': r=a+b; break;
  case '-': r=a-b; break;
  case '*': r=a*b; break;
  case '/': r=b===0?'Error':a/b; break;
 }

 current = typeof r==="number"
  ? (Number.isInteger(r)?r:parseFloat(r.toFixed(6)))
  : "Error";

 op=""; prev="";
}

function press(v){

 if(!isNaN(v)){
  if(current==="0"||current==="Error") current=v;
  else current+=v;
 }

 else if(v==="."){
  if(!current.includes(".")) current+=".";
 }

 else if(v==="%"){
  if(prev){
    current=(parseFloat(prev)*parseFloat(current)/100).toString();
  } else {
    current=(parseFloat(current)/100).toString();
  }
 }

 else if(['+','-','*','/'].includes(v)){
  if(op) calc();
  prev=current;
  op=v;
  current="0";
 }

 else if(v==="="){
  if(op) calc();
 }

 else if(v==="AC"){
  current="0"; prev=""; op="";
 }

 else if(v==="+/-"){
  if(current!=="Error"){
    current=(parseFloat(current)*-1).toString();
  }
 }

 update();
}

const vals=[
'AC','+/-','%','/',
'7','8','9','*',
'4','5','6','-',
'1','2','3','+',
'0','.','='
];

vals.forEach(v=>{
 let b=document.createElement("button");
 b.textContent=v;
 b.onclick=()=>press(v);
 document.getElementById("buttons").appendChild(b);
});

update();

// ---------------- IA INTELIGENTE ----------------
function fakeAI(text){

 text=text.toLowerCase();

 let nums=text.match(/\d+/g);

 // DINERO
 if(text.includes("gasto")||text.includes("compr")||text.includes("queda")){
  if(nums){
    let a=parseFloat(nums[0]);
    let b=parseFloat(nums[1]||0);
    return `Ay hermosa 🩷✨, veamos:

Tenías ${a} 💰  
Gastaste ${b} 🛍️  

Entonces:
${a} - ${b} = ${a-b}

Te quedan **${a-b}** 🥰🎀`;
  }
 }

 // PORCENTAJE
 if(text.includes("%") && nums){
  let a=parseFloat(nums[0]);
  let b=parseFloat(nums[1]);
  return `Preciosa 💖:

Queremos calcular ${b}% de ${a}

${a} × ${b}/100 = ${(a*b/100)}

Resultado: **${a*b/100}** ✨`;
 }

 // ECUACIONES
 let eq=text.replace(/\s/g,'');
 let m=eq.match(/(\d*)x([\+\-]\d+)?=(\d+)/);

 if(m){
  let a=parseFloat(m[1]||1);
  let b=parseFloat(m[2]||0);
  let c=parseFloat(m[3]);

  let res=(c-b)/a;

  return `Mi reina 🥰✨ resolvemos:

${a}x ${b>=0?'+':''}${b} = ${c}

Pasamos términos:
${a}x = ${c-b}

x = ${(c-b)}/${a}

Resultado final: **x = ${res}** 💖`;
 }

 return "Ay linda 🥺 aún no entiendo ese problema, pero puedo ayudarte con operaciones, porcentajes y ecuaciones 💕";
}

// CHAT
function send(){
 let text=document.getElementById("input").value;
 if(!text) return;

 let chat=document.getElementById("chat");

 let u=document.createElement("div");
 u.className="msg-user";
 u.textContent=text;
 chat.appendChild(u);

 let a=document.createElement("div");
 a.className="msg-ai";
 a.innerHTML=fakeAI(text);
 chat.appendChild(a);

 document.getElementById("input").value="";
}

// MODO
function switchMode(){
 let m=document.getElementById("mode").value;

 document.getElementById("normal").style.display = m==="normal"?"block":"none";
 document.getElementById("aiMode").style.display = m==="ia"?"block":"none";
}
</script>

</body>
</html>
