<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Kiara</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: linear-gradient(180deg, #ffe6f2, #ff99cc);
  font-family: 'Roboto Mono', monospace;
  color: #c71585;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

.header {
  text-align: center;
  padding: 20px;
  background: #ff1493;
  color: white;
  font-size: 1.6rem;
  font-weight: bold;
}

.display {
  background: #fff0f5;
  font-size: 2.5rem;
  text-align: right;
  padding: 25px;
  min-height: 120px;
  border-bottom: 5px solid #ff1493;
  word-break: break-all;
}

.buttons {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  padding: 15px;
}

button {
  font-size: 1.8rem;
  border: none;
  border-radius: 18px;
  background: #ffb3d1;
  color: white;
}

.operator { background: #ff4da6; }
.equal { background: #ff1493; }
.special { background: #ffe6f2; color: #c71585; }
.zero { grid-column: span 2; }

#heartContainer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.heart {
  position: absolute;
  font-size: 25px;
  animation: float 2s ease-out forwards;
}

@keyframes float {
  to {
    transform: translateY(-400px);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="header">Calculadora de Kiara</div>
<div id="display" class="display">0</div>
<div class="buttons" id="buttons"></div>
<div id="heartContainer"></div>

<script>
const display = document.getElementById('display');
const buttons = document.getElementById('buttons');
const heartContainer = document.getElementById('heartContainer');

let current = '0';
let previous = null;
let operator = null;

// 🔥 NORMALIZADOR (CLAVE DEL FIX)
function normalize(op) {
  return op === '×' ? '*' :
         op === '÷' ? '/' :
         op === '−' ? '-' : op;
}

function updateDisplay() {
  if (operator && previous !== null) {
    display.textContent = `${previous} ${operator} ${current}`;
  } else {
    display.textContent = current;
  }
}

function calculate() {
  if (previous === null || operator === null) return;

  let prev = parseFloat(previous);
  let curr = parseFloat(current);
  let result;

  switch (normalize(operator)) {
    case '+': result = prev + curr; break;
    case '-': result = prev - curr; break;
    case '*': result = prev * curr; break;
    case '/': result = curr === 0 ? 'Error' : prev / curr; break;
    case '%': result = curr === 0 ? 'Error' : prev % curr; break;
  }

  if (typeof result === 'number') {
    current = Number.isInteger(result)
      ? result.toString()
      : result.toFixed(6);
  } else {
    current = 'Error';
  }

  previous = null;
  operator = null;
}

function showHearts() {
  for (let i = 0; i < 20; i++) {
    const h = document.createElement('div');
    h.className = 'heart';
    h.textContent = '❤️';
    h.style.left = Math.random() * 100 + 'vw';
    h.style.bottom = '0';
    heartContainer.appendChild(h);
    setTimeout(() => h.remove(), 2000);
  }
}

function press(val) {

  if (!isNaN(val)) {
    current = (current === '0') ? val : current + val;
  }

  else if (val === '.') {
    if (!current.includes('.')) current += '.';
  }

  else if (['+', '−', '×', '÷', '%'].includes(val)) {
    if (operator !== null) calculate();
    previous = current;
    operator = val;
    current = '0';
  }

  else if (val === '=') {
    calculate();
    if (current !== 'Error') showHearts();
  }

  else if (val === 'AC') {
    current = '0';
    previous = null;
    operator = null;
  }

  else if (val === '+/-') {
    current = (parseFloat(current) * -1).toString();
  }

  updateDisplay();
}

// BOTONES
const values = [
  'AC','+/-','%','÷',
  '7','8','9','×',
  '4','5','6','−',
  '1','2','3','+',
  '0','.','='
];

values.forEach(v => {
  const b = document.createElement('button');
  b.textContent = v;

  if (!isNaN(v)) b.classList.add('number');
  else if (['+','−','×','÷'].includes(v)) b.classList.add('operator');
  else if (v === '=') b.classList.add('equal');
  else b.classList.add('special');

  if (v === '0') b.classList.add('zero');

  b.onclick = () => press(v);
  buttons.appendChild(b);
});

updateDisplay();
</script>

</body>
</html>
