<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Calculadora de Kiara</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: linear-gradient(180deg, #ffe6f2, #ff99cc);
  font-family: 'Roboto Mono', monospace;
  color: #c71585;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.header {
  text-align: center;
  padding: 20px 15px;
  background: #ff1493;
  color: white;
  font-size: 1.65rem;
  font-weight: bold;
}

.display {
  background: #fff0f5;
  font-size: 2.8rem;
  text-align: right;
  padding: 30px 22px;
  min-height: 130px;
  border-bottom: 6px solid #ff1493;
  word-break: break-all;
}

.buttons {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  padding: 18px;
}

button {
  font-size: 1.9rem;
  border: none;
  border-radius: 22px;
  box-shadow: 0 6px 12px rgba(255,20,147,0.4);
}

button:active {
  transform: scale(0.92);
}

.number, .decimal { background: #ffb3d1; color: white; }
.operator { background: #ff4da6; color: white; }
.equal { background: #ff1493; color: white; }
.special { background: #ffe6f2; color: #c71585; }
.zero { grid-column: span 2; }

.footer {
  text-align: center;
  padding: 10px;
}

#heartContainer {
  position: fixed;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.heart {
  position: absolute;
  animation: floatHeart 2s forwards;
}

@keyframes floatHeart {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-400px); opacity: 0; }
}
</style>
</head>

<body>

<div class="header">Calculadora de Kiara</div>
<div id="display" class="display">0</div>
<div class="buttons" id="buttonsContainer"></div>
<div class="footer">Presiona = ❤️</div>
<div id="heartContainer"></div>

<script>
const display = document.getElementById('display');
const buttonsContainer = document.getElementById('buttonsContainer');
const heartContainer = document.getElementById('heartContainer');

let currentInput = '0';
let previousInput = '';
let operator = '';

const speechMap = {
 '0':'cero','1':'uno','2':'dos','3':'tres','4':'cuatro',
 '5':'cinco','6':'seis','7':'siete','8':'ocho','9':'nueve',
 '+':'más','−':'menos','×':'por','÷':'dividido'
};

function speak(text){
 if(!('speechSynthesis' in window)) return;
 speechSynthesis.cancel();
 let u = new SpeechSynthesisUtterance(text);
 u.lang = 'es-ES';
 speechSynthesis.speak(u);
}

function updateDisplay(){
 if(operator){
   display.textContent = previousInput + " " + operator + " " + currentInput;
 } else {
   display.textContent = currentInput;
 }
}

function calculate(){
 let a = parseFloat(previousInput);
 let b = parseFloat(currentInput);
 let result;

 switch(operator){
   case '+': result = a + b; break;
   case '−': result = a - b; break;
   case '×': result = a * b; break;
   case '÷': result = b === 0 ? 'Error' : a / b; break;
   case '%': result = b === 0 ? 'Error' : a % b; break;
 }

 if(typeof result === "number"){
   currentInput = Number.isInteger(result) ? result.toString() : result.toFixed(6);
 } else {
   currentInput = 'Error';
 }

 operator = '';
 previousInput = '';
}

function showHearts(){
 for(let i=0;i<20;i++){
   let h=document.createElement('div');
   h.className='heart';
   h.innerHTML='❤️';
   h.style.left=Math.random()*100+'vw';
   h.style.bottom='0';
   heartContainer.appendChild(h);
   setTimeout(()=>h.remove(),2000);
 }
}

function handleButton(val){

 if(speechMap[val]) speak(speechMap[val]);

 if(!isNaN(val)){
   currentInput = currentInput === '0' ? val : currentInput + val;
 }

 else if(val === '.'){
   if(!currentInput.includes('.')) currentInput += '.';
 }

 else if(['+','−','×','÷','%'].includes(val)){
   previousInput = currentInput;
   operator = val;
   currentInput = '0';
 }

 else if(val === '='){
   if(operator){
     calculate();
     showHearts();
     speak("resultado " + currentInput);
   }
 }

 else if(val === 'AC'){
   currentInput='0';
   previousInput='';
   operator='';
 }

 else if(val === '+/-'){
   currentInput = (parseFloat(currentInput)*-1).toString();
 }

 updateDisplay();
}

const values = [
 'AC','+/-','%','÷',
 '7','8','9','×',
 '4','5','6','−',
 '1','2','3','+',
 '0','.','='
];

values.forEach(v=>{
 let b=document.createElement('button');
 b.textContent=v;
 b.onclick=()=>handleButton(v);

 if(v==='0') b.classList.add('zero');
 if(!isNaN(v)) b.classList.add('number');
 else if(v==='.') b.classList.add('decimal');
 else if(['+','−','×','÷'].includes(v)) b.classList.add('operator');
 else if(v==='=') b.classList.add('equal');
 else b.classList.add('special');

 buttonsContainer.appendChild(b);
});

updateDisplay();
</script>

</body>
</html>
